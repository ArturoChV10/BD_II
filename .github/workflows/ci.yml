name: CI - Restaurant Reservations API

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  validate-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: restaurant-reservations

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: restaurant-reservations/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Validar carga de la API con PostgreSQL
        run: node -e "require('./src/app'); console.log('API carga correctamente con PostgreSQL')"

      - name: Validar carga de la API con MongoDB
        run: DATABASE_TYPE=mongodb node -e "require('./src/app'); console.log('API carga correctamente con MongoDB')"

      - name: Validar archivo principal del servidor
        run: node -c src/server.js

      - name: Validar construcción de Docker
        run: docker build -t restaurant-reservations-api .
