name: CD - Publish Docker Image

on:
  workflow_run:
    workflows:
      - CI - Restaurant Reservations API
    types:
      - completed
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Preparar nombre de imagen
        id: image
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${OWNER_LC}/restaurant-reservations-api" >> "$GITHUB_OUTPUT"

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v7
        with:
          context: ./restaurant-reservations
          file: ./restaurant-reservations/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.event.workflow_run.head_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
