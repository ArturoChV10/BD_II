upstream api_backend {
    server api:3000;
}

server {
    listen 80;

    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # location /search/ {
    #     proxy_pass http://search-service:3001/;
    #     proxy_set_header Host $host;
    # }

    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}